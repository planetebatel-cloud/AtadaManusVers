name: Keep Render Backend Warm

# Render's free web tier sleeps after 15 minutes of inactivity. The first
# request after that takes 30-45 s to wake the container — every user-facing
# interaction that hits the API feels broken. This workflow pings /api/health
# every 10 minutes so the container never sleeps.
#
# GitHub-hosted cron is free, has no concurrency cost (manual jobs still run),
# and is unlimited minutes on public repos.

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled jobs by a few minutes
    # during high-load windows, which is still well under Render's 15 min
    # sleep threshold.
    - cron: "*/10 * * * *"
  # Allow manual trigger from the Actions tab for ad-hoc warm-ups.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            code=$(curl -sS -o response.txt -w "%{http_code}" \
              --max-time 60 \
              https://atada-api.onrender.com/api/health || echo "000")
            echo "HTTP $code"
            cat response.txt || true
            echo
            if [ "$code" = "200" ]; then
              echo "Backend is warm."
              exit 0
            fi
            sleep 5
          done
          echo "Backend never returned 200 after 3 attempts." >&2
          exit 1
